<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./style.css" />

    <script src="./components/header.component.js" defer></script>
    <script src="./components/footer.component.js" defer></script>

    <script src="./services/userService.js" type="module"></script>
    <title>Twój Profil</title>



    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        footer {
            margin-top: 0;
        }
    </style>
</head>

<body>

    <sanokgo-header></sanokgo-header>

    <div class="profile-container">
        <div class="profile-card">
            <div class="avatar">👤</div>
            <div class="info">
                <h2 id="disp-username">Użytkownik</h2>
                <p id="disp-email">email@przyklad.pl</p>
                <span class="badge" id="disp-role">User</span>
            </div>
            <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 20px 0;">
            <p style="font-size: 12px; color: #bbb;">Dołączył: <span id="disp-date">-</span></p>
            <button class="logout-btn" onclick="handleLogOff()">Wyloguj</button>
        </div>
        <div class="locations-card">
            <h3>Odkryte miejsca 🏰</h3>
            <div id="locations-list" class="locations-grid">
                <!-- Tutaj wpadną lokacje z JS -->
            </div>
        </div>
    </div>

    <sanokgo-footer></sanokgo-footer>

</body>

</html>

<script>

    window.onload = function () {
        const currentUserEmail = localStorage.getItem('currentUser');
        const users = JSON.parse(localStorage.getItem('users') || "[]");
        const userData = users.find(u => u.email === currentUserEmail);

        if (userData) {
            // Podstawowe dane
            document.getElementById('disp-username').innerText = userData.username;
            document.getElementById('disp-email').innerText = userData.email;
            document.getElementById('disp-role').innerText = userData.role;
            document.getElementById('disp-date').innerText = new Date(userData.createdAt).toLocaleDateString();

            // OBSŁUGA LOKACJI
            const listContainer = document.getElementById('locations-list');
            const locations = userData.locations || [];

            if (locations.length === 0) {
                listContainer.innerHTML = '<div class="no-locations">Nie odkryłeś jeszcze żadnych miejsc. Ruszaj w drogę! 🚶‍♂️</div>';
            } else {
                listContainer.innerHTML = locations.map(loc => `
                <div class="location-item">
                    <h4>${loc.name}</h4>
                    <p>${loc.info || 'Brak opisu'}</p>
                    <p style="font-size: 10px; margin-top: 5px; color: #888;">
                        📍 ${loc.lat.toFixed(4)}, ${loc.lng.toFixed(4)}
                    </p>
                </div>
            `).join('');
            }

        } else {
            window.location.href = 'login.html';
        }
    };

</script>
